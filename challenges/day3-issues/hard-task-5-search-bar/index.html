<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Bar</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="search-container">
            <h1>Search Products</h1>
            
            <div class="search-wrapper">
                <div class="search-box">
                    <input 
                        type="text" 
                        id="searchInput" 
                        placeholder="Search products, brands, or categories..."
                        class="search-input"
                        autocomplete="off"
                    >
                    <button class="search-btn" id="searchBtn">
                        <span>🔍</span>
                    </button>
                    <button class="clear-btn" id="clearBtn" style="display: none;">✕</button>
                </div>

                <div class="suggestions" id="suggestions"></div>
            </div>

            <div class="filters">
                <div class="filter-group">
                    <label>Category:</label>
                    <select id="categoryFilter">
                        <option value="">All Categories</option>
                        <option value="electronics">Electronics</option>
                        <option value="clothing">Clothing</option>
                        <option value="books">Books</option>
                        <option value="food">Food & Beverages</option>
                        <option value="sports">Sports</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Price Range:</label>
                    <input type="range" id="priceFilter" min="0" max="1000" value="1000">
                    <span id="priceValue">$0 - $1000</span>
                </div>

                <div class="filter-group">
                    <label>Sort by:</label>
                    <select id="sortFilter">
                        <option value="relevance">Relevance</option>
                        <option value="price-low">Price: Low to High</option>
                        <option value="price-high">Price: High to Low</option>
                        <option value="newest">Newest</option>
                        <option value="popular">Most Popular</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="results-section">
            <div class="results-info">
                <span id="resultCount">No results</span>
                <button class="advanced-btn" id="advancedBtn">Advanced Search</button>
            </div>

            <div class="results-container" id="resultsContainer">
                <div class="no-results">
                    <p>Start typing to search for products...</p>
                </div>
            </div>
        </div>

        <!-- Advanced Search Modal -->
        <div class="modal" id="advancedModal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Advanced Search</h2>
                    <button class="close-btn" id="closeModal">✕</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label>Exact Match</label>
                        <input type="text" id="exactMatch" placeholder="Enter exact phrase...">
                    </div>
                    <div class="form-group">
                        <label>Contains All Words</label>
                        <input type="text" id="allWords" placeholder="word1 word2 word3">
                    </div>
                    <div class="form-group">
                        <label>Contains Any Word</label>
                        <input type="text" id="anyWord" placeholder="word1 word2 word3">
                    </div>
                    <div class="form-group">
                        <label>Excludes Words</label>
                        <input type="text" id="excludeWords" placeholder="word1 word2 word3">
                    </div>
                    <div class="form-actions">
                        <button class="btn-primary" id="advancedSearch">Search</button>
                        <button class="btn-secondary" id="resetAdvanced">Reset</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
